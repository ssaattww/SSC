name: PR .NET Tests

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  dotnet-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Discover test and generator projects
        id: discover
        shell: bash
        run: |
          mapfile -t test_projects < <(git ls-files '*.csproj' | grep -Ei '(test|tests)' || true)
          mapfile -t generator_projects < <(git ls-files '*.csproj' | grep -Ei '(generator|generators)' | grep -Evi '(test|tests)' || true)

          if [[ ${#test_projects[@]} -eq 0 ]]; then
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
          else
            {
              echo "has_tests=true"
              echo "test_projects<<EOF"
              printf '%s\n' "${test_projects[@]}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

          if [[ ${#generator_projects[@]} -eq 0 ]]; then
            echo "has_generators=false" >> "$GITHUB_OUTPUT"
          else
            {
              echo "has_generators=true"
              echo "generator_projects<<EOF"
              printf '%s\n' "${generator_projects[@]}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Restore and build source generators
        if: ${{ steps.discover.outputs.has_generators == 'true' }}
        shell: bash
        run: |
          while IFS= read -r project; do
            [[ -z "$project" ]] && continue
            echo "Building generator: $project"
            dotnet restore "$project"
            dotnet build "$project" --configuration Release --no-restore --verbosity minimal
          done <<< "${{ steps.discover.outputs.generator_projects }}"

      - name: Restore and run tests
        if: ${{ steps.discover.outputs.has_tests == 'true' }}
        shell: bash
        run: |
          while IFS= read -r project; do
            [[ -z "$project" ]] && continue
            echo "Testing: $project"
            dotnet restore "$project"
            dotnet test "$project" --configuration Release --no-restore --verbosity minimal
          done <<< "${{ steps.discover.outputs.test_projects }}"

      - name: No test projects found
        if: ${{ steps.discover.outputs.has_tests != 'true' }}
        run: echo "::notice::No .NET test projects were found. Skipping tests."
